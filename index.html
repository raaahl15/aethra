    <style>
        /* Efek Latar Belakang Gradasi Cair (Liquid Gradient) dengan palet baru */
        body {
            margin: 0;
            min-height: 100vh;
            color: #d4e4fa;
            background-color: #081254; /* Deep royal blue base */
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            opacity: 0.85; /* Vibrance lebih tinggi */
            filter: blur(80px); /* Ekstra blur agar warna menyatu mulus seperti foto referensi */
        }

        body::before {
            /* Kombinasi Teal Cerah, Biru Pekat, dan Cyan */
            background: radial-gradient(circle at 25% 25%, #00e6a8 0%, transparent 55%),
                        radial-gradient(circle at 75% 60%, #0d278a 0%, transparent 60%),
                        radial-gradient(circle at 40% 80%, #00b4ff 0%, transparent 55%);
            animation: liquidMove1 12s linear infinite; /* Durasi dipercepat dari 18s ke 12s */
        }

        body::after {
            /* Lapisan tambahan Medium Blue, Aqua, dan Indigo Tua */
            background: radial-gradient(circle at 65% 15%, #1565c0 0%, transparent 55%),
                        radial-gradient(circle at 15% 65%, #1de9b6 0%, transparent 50%),
                        radial-gradient(circle at 85% 85%, #050b36 0%, transparent 60%);
            animation: liquidMove2 15s linear infinite reverse; /* Durasi dipercepat dari 22s ke 15s */
        }

        /* Keyframes diperbarui untuk pergerakan yang lebih luas dan kentara */
        @keyframes liquidMove1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(8%, -8%) rotate(120deg) scale(1.2); }
            66% { transform: translate(-8%, 8%) rotate(240deg) scale(0.8); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        @keyframes liquidMove2 {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(15%, 20%) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        
        /* Optimasi Glassmorphism yang lebih halus (hilangkan garis bayang hitam keras) */
        .glass-panel, .glass-card {
            background: rgba(3, 15, 25, 0.35) !important; /* Warna biru gelap yang lebih telus */
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08) !important; /* Garis sempadan putih yang sangat nipis */
            /* Menggantikan bayang hitam pekat dengan bayang lembut berlapis (glowing cyan) */
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.2), 
                0 0 40px rgba(0, 241, 253, 0.08) !important;
        }
        .glass-input, .input-glass {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        .glass-input:focus, .input-glass:focus-within {
            border-color: #00f1fd !important;
            box-shadow: 0 0 12px rgba(0, 241, 253, 0.3);
            outline: none;
            background: rgba(5, 20, 36, 0.6) !important;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00dce6 0%, #007cc9 100%);
            box-shadow: 0 4px 16px rgba(0, 220, 230, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(0, 220, 230, 0.5);
            transform: translateY(-2px);
        }
        
        /* Background Effects */
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.4; }
        .bg-glob-1 { background: radial-gradient(circle, rgba(0,241,253,0.15) 0%, rgba(5,20,36,0) 70%); width: 800px; height: 800px; position: absolute; top: -200px; left: -200px; border-radius: 50%; z-index: -1; filter: blur(60px); }
        .bg-glob-2 { background: radial-gradient(circle, rgba(0,124,201,0.15) 0%, rgba(5,20,36,0) 70%); width: 600px; height: 600px; position: absolute; bottom: -100px; right: -100px; border-radius: 50%; z-index: -1; filter: blur(50px); }
        .bg-gradient-glow { background: radial-gradient(circle at center, rgba(0, 241, 253, 0.15) 0%, transparent 70%); }
        .neon-glow { box-shadow: 0 0 8px currentColor; }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(0, 220, 230, 0.5); }
        .gradient-text { background: linear-gradient(90deg, #dcfdff 0%, #00dce6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #010f1f; }
        ::-webkit-scrollbar-thumb { background: #273647; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #46464c; }

        /* Animasi EKG & Scanner untuk HomePage */
        @keyframes ekg-wave {
            0% { stroke-dashoffset: 1000; }
            100% { stroke-dashoffset: 0; }
        }
        .animate-ekg {
            stroke-dasharray: 1000;
            animation: ekg-wave 4s linear infinite;
        }
        @keyframes float-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float-slow 3s ease-in-out infinite;
        }
        .glass-card-interactive {
            background: rgba(5, 20, 36, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card-interactive:hover {
            background: rgba(10, 30, 50, 0.6);
            border-color: rgba(155, 203, 255, 0.3); /* Sentuhan biru pastel saat di-hover */
            transform: translateY(-4px);
            box-shadow: 0 12px 40px 0 rgba(0, 220, 230, 0.15);
        }

        /* Custom Scrollbar untuk Sidebar */
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: rgba(111, 246, 255, 0.3) rgba(3, 15, 25, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(3, 15, 25, 0.3);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(111, 246, 255, 0.3);
            border-radius: 3px;
            border: none;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(111, 246, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Modul Firebase ES6 (Harus dipisah agar bisa dibaca Babel) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Ekspos fungsi Firebase ke window agar React bisa memakainya
        window.fbInitializeApp = initializeApp;
        window.fbGetFirestore = getFirestore;
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbGetDocs = getDocs;
        window.fbQuery = query;
        window.fbWhere = where;
        window.fbOnSnapshot = onSnapshot;
        window.fbUpdateDoc = updateDoc; // BARU DITAMBAHKAN
        window.fbDoc = doc;             // BARU DITAMBAHKAN

        // Beri sinyal ke React bahwa Firebase siap
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================================
        // KONFIGURASI EMAILJS (SILA UBAH DI SINI)
        // ============================================================================
        const EMAILJS_SERVICE_ID = 'aethra1512';
        
        // AMARAN: 'rkjj9ku' adalah tidak sah. Sila masukkan ID yang bermula dengan 'template_'
        // Anda boleh mendapatkannya di dashboard EmailJS -> Email Templates -> Settings -> Template ID
        const EMAILJS_TEMPLATE_ID = 'template_9a2nt88'; 
        
        const EMAILJS_PUBLIC_KEY = 'Et7Lv4Fn__EKiU1gX';
        // ============================================================================

        // --- PAGE: AUTH CONTAINER (VIRAL TIKTOK SPLIT-SCREEN ANIMATION) ---
        const AuthContainer = ({ navigate, onLogin, onSignUp, checkEmailExists }) => {
            const [isLogin, setIsLogin] = useState(true);

            // States for Login
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [isLoginLoading, setIsLoginLoading] = useState(false);

            // States for Sign Up
            const [signUpFullName, setSignUpFullName] = useState('');
            const [signUpEmail, setSignUpEmail] = useState('');
            const [signUpPassword, setSignUpPassword] = useState('');
            const [signUpError, setSignUpError] = useState('');
            const [isSignUpLoading, setIsSignUpLoading] = useState(false);

            // States for OTP Verification
            const [isOtpMode, setIsOtpMode] = useState(false);
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [inputOtp, setInputOtp] = useState('');
            const [resendTimer, setResendTimer] = useState(0);

            // States for Password Recovery (PEMULIHAN KATA SANDI)
            const [isRecoverMode, setIsRecoverMode] = useState(false);
            const [recoverStep, setRecoverStep] = useState(1);
            const [recoverEmail, setRecoverEmail] = useState('');
            const [recoverOtp, setRecoverOtp] = useState('');
            const [inputRecoverOtp, setInputRecoverOtp] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [recoverUserId, setRecoverUserId] = useState(null);

            // --- FUNGSI PEMULIHAN KATA SANDI ---
            const handleRecoverRequest = async (e) => {
                e.preventDefault();
                setLoginError('');
                setIsLoginLoading(true);

                if (!window.db) return;
                
                try {
                    // Cari email di database
                    const usersRef = window.fbCollection(window.db, 'users');
                    const q = window.fbQuery(usersRef, window.fbWhere("email", "==", recoverEmail));
                    const querySnapshot = await window.fbGetDocs(q);

                    if (querySnapshot.empty) {
                        setLoginError('Sistem tidak menemukan email ini dalam database.');
                        setIsLoginLoading(false);
                        return;
                    }

                    // Ambil ID dokumen pengguna untuk diupdate nanti
                    const userDoc = querySnapshot.docs[0];
                    setRecoverUserId(userDoc.id);
                    const userData = userDoc.data();

                    // Buat OTP
                    const otp = Math.floor(100000 + Math.random() * 900000).toString();
                    setRecoverOtp(otp);

                    const templateParams = {
                        email: recoverEmail,
                        to_email: recoverEmail,
                        to_name: userData.fullName,
                        otp: otp
                    };

                    // Kirim Email via EmailJS
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams, EMAILJS_PUBLIC_KEY)
                        .then(() => {
                            setIsLoginLoading(false);
                            setRecoverStep(2); // Pindah ke input OTP
                        })
                        .catch(() => {
                            setIsLoginLoading(false);
                            setLoginError('Gagal mengirim email pemulihan OTP.');
                        });
                } catch (error) {
                    setIsLoginLoading(false);
                    setLoginError('Error sistem saat memproses permintaan.');
                }
            };

            const handleRecoverVerify = (e) => {
                e.preventDefault();
                if (inputRecoverOtp !== recoverOtp) {
                    setLoginError('Kode OTP tidak valid.');
                    return;
                }
                setLoginError('');
                setRecoverStep(3); // Pindah ke tampilan input kata sandi baru
            };

            const handleRecoverReset = async (e) => {
                e.preventDefault();
                if (newPassword.length < 6) {
                    setLoginError('Kata sandi harus terdiri dari minimal 6 karakter.');
                    return;
                }
                setIsLoginLoading(true);
                try {
                    // Update kata sandi di Firestore
                    const userRef = window.fbDoc(window.db, 'users', recoverUserId);
                    await window.fbUpdateDoc(userRef, { password: newPassword });
                    
                    setIsLoginLoading(false);
                    alert('Sistem Aethra: Kata sandi berhasil diperbarui! Silakan login dengan kata sandi baru Anda.');
                    
                    // Reset UI kembali ke tampilan Login
                    setIsRecoverMode(false);
                    setRecoverStep(1);
                    setLoginEmail(recoverEmail);
                    setRecoverEmail('');
                    setNewPassword('');
                    setInputRecoverOtp('');
                    setLoginPassword('');
                } catch (error) {
                    setIsLoginLoading(false);
                    setLoginError('Error: Gagal memperbarui database.');
                }
            };

            // Timer countdown effect
            useEffect(() => {
                let interval;
                if (resendTimer > 0) {
                    interval = setInterval(() => {
                        setResendTimer((prev) => prev - 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [resendTimer]);

            const toggleMode = () => {
                setIsLogin(!isLogin);
                setLoginError('');
                setSignUpError('');
                setIsOtpMode(false);
                setInputOtp('');
            };

            const handleLoginSubmit = async (e) => {
                e.preventDefault();
                if(!loginEmail || !loginPassword) {
                    setLoginError('Email dan Password harus diisi.');
                    return;
                }
                setIsLoginLoading(true);
                const success = await onLogin(loginEmail, loginPassword);
                setIsLoginLoading(false);
                
                if (success) {
                    navigate('home');
                } else {
                    setLoginError('Email atau Password salah, atau akun belum terdaftar.');
                }
            };

            const sendOtpCode = () => {
                const otp = Math.floor(100000 + Math.random() * 900000).toString(); // Generate 6 digit angka acak
                setGeneratedOtp(otp);
                setIsOtpMode(true);
                setResendTimer(60); // Cooldown resend 60 detik
                setIsSignUpLoading(true);

                const templateParams = {
                    email: signUpEmail,      // Menyokong templat jika menggunakan {{email}}
                    to_email: signUpEmail,   // Menyokong templat jika menggunakan {{to_email}}
                    to_name: signUpFullName,
                    otp: otp
                };

                // Memanggil EmailJS dengan parameter yang telah diekstrak di atas
                emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams, EMAILJS_PUBLIC_KEY)
                    .then((response) => {
                        console.log('SUCCESS! Email terkirim', response.status, response.text);
                        setIsSignUpLoading(false);
                        setSignUpError(''); 
                    }, (error) => {
                        console.error('FAILED...', error);
                        setIsSignUpLoading(false);
                        // Menangani error jika Template ID belum tersimpan atau salah
                        if (error && error.status === 400 && error.text && error.text.includes("template ID not found")) {
                             setSignUpError(`Ralat: Template ID "${EMAILJS_TEMPLATE_ID}" tidak sah. Sila semak tab 'Settings' pada templat di EmailJS anda. Ia sepatutnya kelihatan seperti 'template_xxxxx'.`);
                        } else if (error && error.status === 422 && error.text && error.text.includes("recipients address is empty")) {
                             setSignUpError('Ralat: Pembolehubah "To Email" di dalam templat EmailJS anda tidak sepadan. Sila pastikan anda meletakkan {{to_email}} pada ruangan To Email di Settings templat.');
                        } else {
                             setSignUpError('Gagal menghantar e-mel pengesahan. Sila pastikan konfigurasi EmailJS anda adalah betul.');
                        }
                        setIsOtpMode(false);
                    });
            };

            const handleSignUpRequest = async (e) => {
                e.preventDefault();
                setSignUpError('');
                
                if(!signUpFullName || !signUpEmail || !signUpPassword) {
                    setSignUpError('Semua kolom harus diisi.');
                    return;
                }
                if(signUpPassword.length < 6) {
                    setSignUpError('Password minimal 6 karakter.');
                    return;
                }
                
                if (EMAILJS_TEMPLATE_ID === 'YOUR_TEMPLATE_ID') {
                    setSignUpError('Pembangun: Sila kemaskini EMAILJS_TEMPLATE_ID di dalam kod terlebih dahulu.');
                    return;
                }
                
                setIsSignUpLoading(true);
                const emailExists = await checkEmailExists(signUpEmail);
                setIsSignUpLoading(false);

                if (emailExists) {
                    setSignUpError('Akses Ditolak: Email ini sudah terdaftar di sistem Aethra.');
                    return;
                }

                // Lolos pengecekan, kirim OTP
                sendOtpCode();
            };

            const handleVerifyOtpAndRegister = async (e) => {
                e.preventDefault();
                setSignUpError('');

                if (inputOtp !== generatedOtp) {
                    setSignUpError('Kode Otentikasi tidak valid. Silakan coba lagi.');
                    return;
                }

                setIsSignUpLoading(true);
                const success = await onSignUp(signUpFullName, signUpEmail, signUpPassword);
                setIsSignUpLoading(false);

                if (success) {
                    navigate('home');
                } else {
                    setSignUpError('Pendaftaran gagal saat inisiasi database.');
                }
            };

            return (
                <div className="min-h-screen relative flex w-full bg-surface-container-lowest/10 font-body-md overflow-hidden">
                    
                    {/* --- BACKGROUND BLOBS FOR MOBILE --- */}
                    <div className="lg:hidden absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-secondary-fixed/20 rounded-full blur-[80px]"></div>
                    <div className="lg:hidden absolute bottom-[-10%] right-[-10%] w-[300px] h-[300px] bg-tertiary-fixed/20 rounded-full blur-[80px]"></div>
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1200')] opacity-10 bg-cover bg-center mix-blend-overlay"></div>

                    {/* --- DESKTOP BRANDING PANEL (THE SLIDING DOOR) --- */}
                    <div className={`hidden lg:block absolute top-0 w-1/2 h-full z-20 transition-transform duration-[1000ms] ease-in-out ${isLogin ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="relative w-full h-full overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)] bg-surface/50 backdrop-blur-md border-x border-white/5">
                            {/* Dynamic Backgrounds Inside Panel */}
                            <div className={`absolute w-[600px] h-[600px] rounded-full blur-[120px] transition-all duration-[1000ms] ease-in-out ${isLogin ? 'top-[-20%] left-[-10%] bg-secondary-fixed/30' : 'top-[20%] right-[-10%] bg-tertiary-fixed/30'}`}></div>
                            <div className={`absolute w-[500px] h-[500px] rounded-full blur-[100px] transition-all duration-[1000ms] ease-in-out ${isLogin ? 'bottom-[-10%] right-[-10%] bg-tertiary-fixed/20' : 'bottom-[20%] left-[-10%] bg-secondary-fixed/20'}`}></div>
                            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1200')] opacity-10 bg-cover bg-center mix-blend-overlay"></div>
                            
                            {/* Login Text Content (Fades in/out) */}
                            <div className={`absolute inset-0 p-12 flex flex-col justify-between transition-all duration-700 ease-out ${isLogin ? 'opacity-100 delay-300' : 'opacity-0 -translate-x-20 pointer-events-none'}`}>
                                <div className="flex items-center gap-3">

        // --- COMPONENT: TOP HEADER (DENGAN NOTIFIKASI & MENU PROFIL) ---
        const TopHeader = ({ navigate, currentUser, onLogout }) => {
            // State untuk mengontrol buka/tutup menu
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const [isProfileOpen, setIsProfileOpen] = useState(false);

            // State data notifikasi simulasi
            const [notifications, setNotifications] = useState([
                { id: 1, title: 'Peringatan Kritis', message: 'Detak jantung terdeteksi tidak wajar (>110 BPM) pada Pasien.', time: 'Baru saja', type: 'error', read: false },
                { id: 2, title: 'Status Sensor', message: 'Modul MAX30102 berhasil disinkronisasi ke Cloud.', time: '10 mnt lalu', type: 'success', read: false },
                { id: 3, title: 'Pembaruan Sistem', message: 'Patch keamanan v1.2 telah diterapkan oleh Admin.', time: '2 jam lalu', type: 'info', read: true }
            ]);

            const unreadCount = notifications.filter(n => !n.read).length;

            // Fungsi Toggle Menu (pastikan hanya satu menu yang terbuka di waktu bersamaan)
            const toggleNotif = () => {
                setIsNotifOpen(!isNotifOpen);
                if (isProfileOpen) setIsProfileOpen(false);
            };

            const toggleProfile = () => {
                setIsProfileOpen(!isProfileOpen);
                if (isNotifOpen) setIsNotifOpen(false);
            };

            // Menutup semua menu
            const closeAllMenus = () => {
                setIsNotifOpen(false);
                setIsProfileOpen(false);
            };

            const markAllAsRead = () => {
                setNotifications(notifications.map(n => ({ ...n, read: true })));
            };

            const markAsRead = (id) => {
                setNotifications(notifications.map(n => n.id === id ? { ...n, read: true } : n));
            };

            // Fungsi Logout (menggunakan properti onLogout jika ada, atau fallback reset sesi)
            const handleLogoutClick = () => {

                                    <span className="material-symbols-outlined text-[80px] text-tertiary-fixed/50 mb-6">construction</span>
                                    <h2 className="font-h2 text-2xl text-white mb-2">Module Under Development</h2>
                                    <p className="font-body-md text-on-surface-variant text-center max-w-md">Modul <strong className="text-tertiary-fixed capitalize">{activeTab.replace('_', ' ')}</strong> sedang dalam tahap integrasi dengan arsitektur cloud. Silakan kembali ke Main Dashboard.</p>
                                    <button onClick={() => setActiveTab('dashboard')} className="mt-8 px-6 py-2 rounded-full border border-white/20 text-xs font-label-caps text-white hover:bg-white/10 transition-colors uppercase tracking-widest">Kembali ke Dashboard</button>
                                </div>
                            )}

                            {/* ADMIN VIEW: TAB DATA PENGGUNA */}
                            {isAdmin && activeTab === 'admin_users' && (
                                <React.Fragment>
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-8 gap-2">
                                        <div>
                                            <h2 className="font-h2 text-[24px] sm:text-h2 font-bold text-on-surface tracking-tight mb-2">Manajemen Data Pengguna</h2>
                                            <p className="font-body-md text-sm sm:text-body-md text-on-surface-variant">Melihat daftar kredensial operatif Aethra secara langsung dari Firestore.</p>
                                        </div>
                                    </div>
                                    <div className="glass-card rounded-xl overflow-hidden w-full">
                                        <div className="overflow-x-auto">
                                            <table className="w-full min-w-[700px] text-left border-collapse">
                                                <thead className="bg-surface-container/30 backdrop-blur-md">
                                                    <tr className="border-b border-white/20 font-label-caps text-label-caps text-on-surface-variant uppercase">
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Data Diri (Nama)</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Email Operatif</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Kata Sandi</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Status Akun</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="font-body-md text-sm sm:text-body-md text-on-surface divide-y divide-white/10">
                                                    {usersList.map((u, i) => (
                                                        <tr key={i} className="hover:bg-white/10 transition-colors">
                                                            <td className="py-4 px-4 sm:px-6 font-medium text-primary-fixed whitespace-nowrap">{u.fullName}</td>
                                                            <td className="py-4 px-4 sm:px-6 text-on-surface-variant">{u.email}</td>
                                                            <td className="py-4 px-4 sm:px-6 font-mono text-[12px] sm:text-sm tracking-wider opacity-80">{u.password}</td>
                                                            <td className="py-4 px-4 sm:px-6">
                                                                <span className={`px-2 sm:px-3 py-1 rounded-full text-[10px] sm:text-xs font-label-caps uppercase border border-white/10 ${u.email === 'admin@aethra.com' ? 'bg-secondary/20 text-secondary' : 'bg-tertiary-fixed/20 text-tertiary-fixed'}`}>
                                                                    {u.email === 'admin@aethra.com' ? 'Admin' : 'Terverifikasi'}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {usersList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="4" className="py-12 text-center text-on-surface-variant">Belum ada data atau sedang menarik dari Cloud...</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}

                            {/* ADMIN VIEW: TAB LAPORAN KESEHATAN */}
                            {isAdmin && activeTab === 'admin_reports' && (
                                <React.Fragment>
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-8 gap-4">
                                        <div>
                                            <h2 className="font-h2 text-[24px] sm:text-h2 font-bold text-on-surface tracking-tight mb-2">Laporan Kesehatan (Vitals)</h2>
                                            <p className="font-body-md text-sm sm:text-body-md text-on-surface-variant">Pemantauan metrik biomedis untuk semua pengguna terdaftar.</p>
                                        </div>
                                    </div>
                                    <div className="glass-card rounded-xl overflow-hidden w-full">
                                        <div className="overflow-x-auto">
                                            <table className="w-full min-w-[800px] text-left border-collapse">
                                                <thead className="bg-surface-container/30 backdrop-blur-md">
                                                    <tr className="border-b border-white/20 font-label-caps text-[10px] sm:text-label-caps text-on-surface-variant uppercase">
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Pengguna</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Heart Rate</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">SpO2 (Oksigen)</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Tekanan Darah</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Status Kesehatan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="font-body-md text-sm sm:text-body-md text-on-surface divide-y divide-white/10">
                                                    {usersList.map((u, i) => {
                                                        const health = getMockHealthData(u.email);
                                                        return (
                                                            <tr key={i} className="hover:bg-white/10 transition-colors group">
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="font-medium text-primary-fixed whitespace-nowrap">{u.fullName}</div>
                                                                    <div className="text-[12px] sm:text-sm text-on-surface-variant">{u.email}</div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-baseline gap-1">
                                                                        <span className="font-data-display text-[20px] sm:text-[24px]">{health.hr}</span>
                                                                        <span className="text-[10px] sm:text-xs text-on-surface-variant">BPM</span>
                                                                    </div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-baseline gap-1">
                                                                        <span className="font-data-display text-[20px] sm:text-[24px]">{health.spo2}</span>
                                                                        <span className="text-[10px] sm:text-xs text-on-surface-variant">%</span>
                                                                    </div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-baseline gap-1">
                                                                        <span className="font-data-display text-[20px] sm:text-[24px]">{health.bp}</span>
                                                                        <span className="text-[10px] sm:text-xs text-on-surface-variant">mmHg</span>
                                                                    </div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-center gap-2">
                                                                        <div className={`w-2 h-2 rounded-full ${health.dotColor} neon-glow shrink-0`}></div>
                                                                        <span className={`${health.color} font-label-caps uppercase text-[10px] whitespace-nowrap`}>{health.status}</span>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {usersList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="5" className="py-12 text-center text-on-surface-variant">Belum ada data atau sedang menarik dari Cloud...</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('auth');
            
            // --- STATE DATABASE ---
            const [users, setUsers] = useState([]); 
            const [currentUser, setCurrentUser] = useState(null); 
            const [dbReady, setDbReady] = useState(false);

            const firebaseConfig = {
                apiKey: "AIzaSyDDYYlbjYJd3aUH04xlNcVIwt-6FhuqDxg",
                authDomain: "aethra-health.firebaseapp.com",
                projectId: "aethra-health",
                storageBucket: "aethra-health.firebasestorage.app",
                messagingSenderId: "1092134542451",
                appId: "1:1092134542451:web:b6a83dedfb562b37e4de06",
                measurementId: "G-MP3R2GG8N2"
            };

            // 1. Inisialisasi Firebase Database
            useEffect(() => {
                const initFirebase = () => {
                    if (window.fbInitializeApp && window.fbGetFirestore) {
                        try {
                            const app = window.fbInitializeApp(firebaseConfig);
                            window.db = window.fbGetFirestore(app);
                            setDbReady(true);
                        } catch (e) {
                            console.error("Gagal menginisialisasi Firebase.", e);
                        }
                    }
                };

                if (window.fbInitializeApp) {
                    initFirebase();
                } else {
                    window.addEventListener('firebaseLoaded', initFirebase);
                    return () => window.removeEventListener('firebaseLoaded', initFirebase);
                }
            }, []);

            // 2. Tarik Data Akun secara Real-Time
            useEffect(() => {
                if (!dbReady || !window.db) return;
                
                try {
                    const usersRef = window.fbCollection(window.db, 'users');
                    const unsubscribe = window.fbOnSnapshot(usersRef, (snapshot) => {
                        const loadedUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setUsers(loadedUsers);
                    }, (error) => {
                        console.error("Firestore Error:", error);
                    });
                    
                    return () => unsubscribe();
                } catch(e) {}
            }, [dbReady]);

            // --- FUNGSI BARU: CEK EMAIL DUPLIKAT ---
            const checkEmailExists = async (email) => {
                if (!dbReady || !window.db) return false;
                try {
                    const usersRef = window.fbCollection(window.db, 'users');
                    const q = window.fbQuery(usersRef, window.fbWhere("email", "==", email));
                    const querySnapshot = await window.fbGetDocs(q);
                    return !querySnapshot.empty; // True jika email sudah ada
                } catch (e) {
                    console.error("Error checking email:", e);
                    return true; // Anggap ada jika error untuk mencegah eksploitasi
                }
            };

            const handleSignUp = async (fullName, email, password) => {
                const userExists = users.find(u => u.email === email);
                if (userExists) return false; 
                
                const newUser = { fullName, email, password, createdAt: new Date().toISOString() };
                
                if (dbReady && window.db) {
                    try {
                        const usersRef = window.fbCollection(window.db, 'users');
                        await window.fbAddDoc(usersRef, newUser);
                        setCurrentUser(newUser); 
                        return true;
                    } catch(e) {
                        return false;
                    }
                } else {
                    return false;
                }
            };

            const handleLogin = async (email, password) => {
                if (!dbReady || !window.db) {
                    return false;
                }

                try {
                    const usersRef = window.fbCollection(window.db, 'users');
                    const q = window.fbQuery(usersRef, window.fbWhere("email", "==", email), window.fbWhere("password", "==", password));
                    
                    const querySnapshot = await window.fbGetDocs(q);
                    if (!querySnapshot.empty) {
                        const foundUser = querySnapshot.docs[0].data();
                        setCurrentUser(foundUser);
                        return true;
                    }
                    return false;
                } catch (e) {
                    return false;
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentPage('auth');
            };

            const renderPage = () => {
                switch(currentPage) {
                    case 'auth': 
                        return <AuthContainer navigate={setCurrentPage} onLogin={handleLogin} onSignUp={handleSignUp} checkEmailExists={checkEmailExists} />;
                    case 'home': 
                        return <HomePage navigate={setCurrentPage} currentUser={currentUser} />;
                    case 'about': 
                        return <AboutPage navigate={setCurrentPage} currentUser={currentUser} />;
                    case 'dashboard': 
                        return <DashboardPage navigate={setCurrentPage} currentUser={currentUser} onLogout={handleLogout} usersList={users} />;
                    default: 
                        return <AuthContainer navigate={setCurrentPage} onLogin={handleLogin} onSignUp={handleSignUp} checkEmailExists={checkEmailExists} />;
                }
            };

            return (
                <div className="w-full min-h-screen">
                    {renderPage()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

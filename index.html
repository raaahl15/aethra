<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aethra Health Suite</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- React & Babel via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-surface": "#d4e4fa", "surface-container-lowest": "#010f1f", "primary-fixed-dim": "#c0c6de",
                        "on-secondary-fixed": "#002022", "primary-fixed": "#dce1fb", "on-tertiary-fixed": "#001d34",
                        "on-primary-container": "#72778d", "outline-variant": "#46464c", "on-primary": "#2a3043",
                        "outline": "#909097", "surface": "#051424", "surface-variant": "#273647", "primary": "#c0c6de",
                        "on-error": "#690005", "secondary-container": "#00f1fd", "on-surface-variant": "#c6c6cd",
                        "surface-tint": "#c0c6de", "surface-dim": "#051424", "on-tertiary-container": "#007cc9",
                        "on-secondary-fixed-variant": "#004f53", "on-tertiary-fixed-variant": "#004a7a",
                        "inverse-primary": "#585e73", "on-surface": "#d4e4fa", "secondary-fixed": "#6ff6ff",
                        "on-primary-fixed-variant": "#40465a", "surface-bright": "#2c3a4c", "error-container": "#93000a",
                        "surface-container": "#122131", "tertiary-fixed": "#d0e4ff", "on-background": "#d4e4fa",
                        "surface-container-high": "#1c2b3c", "background": "#051424", "on-secondary": "#00373a",
                        "inverse-on-surface": "#233143", "secondary": "#dcfdff", "surface-container-low": "#0d1c2d",
                        "on-error-container": "#ffdad6", "on-secondary-container": "#006a6f", "tertiary-container": "#000712",
                        "secondary-fixed-dim": "#00dce6", "tertiary-fixed-dim": "#9bcbff", "surface-container-highest": "#273647",
                        "on-tertiary": "#003256", "primary-container": "#020617", "on-primary-fixed": "#151b2d",
                        "error": "#ffb4ab", "tertiary": "#9bcbff"
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    spacing: { "margin-x": "40px", "stack-gap": "16px", "container-max": "1440px", "gutter": "24px", "unit": "8px", "card-padding": "24px" },
                    fontFamily: {
                        "h1": ["Space Grotesk", "sans-serif"], "data-display": ["Space Grotesk", "sans-serif"],
                        "label-caps": ["Space Grotesk", "sans-serif"], "h2": ["Space Grotesk", "sans-serif"],
                        "h3": ["Space Grotesk", "sans-serif"], "body-md": ["Manrope", "sans-serif"],
                        "body-lg": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Efek Latar Belakang Gradasi Cair (Liquid Gradient) dengan palet baru */
        body {
            margin: 0;
            min-height: 100vh;
            color: #d4e4fa;
            background-color: #081254; /* Deep royal blue base */
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            opacity: 0.85; /* Vibrance lebih tinggi */
            filter: blur(80px); /* Ekstra blur agar warna menyatu mulus seperti foto referensi */
        }

        body::before {
            /* Kombinasi Teal Cerah, Biru Pekat, dan Cyan */
            background: radial-gradient(circle at 25% 25%, #00e6a8 0%, transparent 55%),
                        radial-gradient(circle at 75% 60%, #0d278a 0%, transparent 60%),
                        radial-gradient(circle at 40% 80%, #00b4ff 0%, transparent 55%);
            animation: liquidMove1 12s linear infinite; /* Durasi dipercepat dari 18s ke 12s */
        }

        body::after {
            /* Lapisan tambahan Medium Blue, Aqua, dan Indigo Tua */
            background: radial-gradient(circle at 65% 15%, #1565c0 0%, transparent 55%),
                        radial-gradient(circle at 15% 65%, #1de9b6 0%, transparent 50%),
                        radial-gradient(circle at 85% 85%, #050b36 0%, transparent 60%);
            animation: liquidMove2 15s linear infinite reverse; /* Durasi dipercepat dari 22s ke 15s */
        }

        /* Keyframes diperbarui untuk pergerakan yang lebih luas dan kentara */
        @keyframes liquidMove1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(8%, -8%) rotate(120deg) scale(1.2); }
            66% { transform: translate(-8%, 8%) rotate(240deg) scale(0.8); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        @keyframes liquidMove2 {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(15%, 20%) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        
        /* Optimasi Glassmorphism agar lebih kontras dengan background cair */
        .glass-panel, .glass-card {
            background: rgba(5, 20, 36, 0.45) !important;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-input, .input-glass {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        .glass-input:focus, .input-glass:focus-within {
            border-color: #00f1fd !important;
            box-shadow: 0 0 12px rgba(0, 241, 253, 0.3);
            outline: none;
            background: rgba(5, 20, 36, 0.6) !important;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00dce6 0%, #007cc9 100%);
            box-shadow: 0 4px 16px rgba(0, 220, 230, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(0, 220, 230, 0.5);
            transform: translateY(-2px);
        }
        
        /* Background Effects */
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.4; }
        .bg-glob-1 { background: radial-gradient(circle, rgba(0,241,253,0.15) 0%, rgba(5,20,36,0) 70%); width: 800px; height: 800px; position: absolute; top: -200px; left: -200px; border-radius: 50%; z-index: -1; filter: blur(60px); }
        .bg-glob-2 { background: radial-gradient(circle, rgba(0,124,201,0.15) 0%, rgba(5,20,36,0) 70%); width: 600px; height: 600px; position: absolute; bottom: -100px; right: -100px; border-radius: 50%; z-index: -1; filter: blur(50px); }
        .bg-gradient-glow { background: radial-gradient(circle at center, rgba(0, 241, 253, 0.15) 0%, transparent 70%); }
        .neon-glow { box-shadow: 0 0 8px currentColor; }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(0, 220, 230, 0.5); }
        .gradient-text { background: linear-gradient(90deg, #dcfdff 0%, #00dce6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #010f1f; }
        ::-webkit-scrollbar-thumb { background: #273647; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #46464c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Modul Firebase ES6 (Harus dipisah agar bisa dibaca Babel) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Ekspos fungsi Firebase ke window agar React bisa memakainya
        window.fbInitializeApp = initializeApp;
        window.fbGetFirestore = getFirestore;
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbGetDocs = getDocs;
        window.fbQuery = query;
        window.fbWhere = where;
        window.fbOnSnapshot = onSnapshot;

        // Beri sinyal ke React bahwa Firebase siap
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PAGE: AUTH CONTAINER (VIRAL TIKTOK SPLIT-SCREEN ANIMATION) ---
        const AuthContainer = ({ navigate, onLogin, onSignUp }) => {
            const [isLogin, setIsLogin] = useState(true);

            // States for Login
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [isLoginLoading, setIsLoginLoading] = useState(false);

            // States for Sign Up
            const [signUpFullName, setSignUpFullName] = useState('');
            const [signUpEmail, setSignUpEmail] = useState('');
            const [signUpPassword, setSignUpPassword] = useState('');
            const [signUpError, setSignUpError] = useState('');
            const [isSignUpLoading, setIsSignUpLoading] = useState(false);

            const toggleMode = () => {
                setIsLogin(!isLogin);
                setLoginError('');
                setSignUpError('');
            };

            const handleLoginSubmit = async (e) => {
                e.preventDefault();
                if(!loginEmail || !loginPassword) {
                    setLoginError('Email dan Password harus diisi.');
                    return;
                }
                setIsLoginLoading(true);
                const success = await onLogin(loginEmail, loginPassword);
                setIsLoginLoading(false);
                
                if (success) {
                    navigate('home');
                } else {
                    setLoginError('Email atau Password salah, atau akun belum terdaftar.');
                }
            };

            const handleSignUpSubmit = async (e) => {
                e.preventDefault();
                if(!signUpFullName || !signUpEmail || !signUpPassword) {
                    setSignUpError('Semua kolom harus diisi.');
                    return;
                }
                if(signUpPassword.length < 6) {
                    setSignUpError('Password minimal 6 karakter.');
                    return;
                }
                
                setIsSignUpLoading(true);
                const success = await onSignUp(signUpFullName, signUpEmail, signUpPassword);
                setIsSignUpLoading(false);

                if (success) {
                    navigate('home');
                } else {
                    setSignUpError('Pendaftaran gagal. Email ini mungkin sudah terdaftar.');
                }
            };

            return (
                <div className="min-h-screen relative flex w-full bg-surface-container-lowest/10 font-body-md overflow-hidden">
                    
                    {/* --- BACKGROUND BLOBS FOR MOBILE --- */}
                    <div className="lg:hidden absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-secondary-fixed/20 rounded-full blur-[80px]"></div>
                    <div className="lg:hidden absolute bottom-[-10%] right-[-10%] w-[300px] h-[300px] bg-tertiary-fixed/20 rounded-full blur-[80px]"></div>
                    
                    {/* --- DESKTOP BRANDING PANEL (THE SLIDING DOOR) --- */}
                    <div className={`hidden lg:block absolute top-0 w-1/2 h-full z-20 transition-transform duration-[1000ms] ease-in-out ${isLogin ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="relative w-full h-full overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)] bg-surface/50 backdrop-blur-md border-x border-white/5">
                            {/* Dynamic Backgrounds Inside Panel */}
                            <div className={`absolute w-[600px] h-[600px] rounded-full blur-[120px] transition-all duration-[1000ms] ease-in-out ${isLogin ? 'top-[-20%] left-[-10%] bg-secondary-fixed/30' : 'top-[20%] right-[-10%] bg-tertiary-fixed/30'}`}></div>
                            <div className={`absolute w-[500px] h-[500px] rounded-full blur-[100px] transition-all duration-[1000ms] ease-in-out ${isLogin ? 'bottom-[-10%] right-[-10%] bg-tertiary-fixed/20' : 'bottom-[20%] left-[-10%] bg-secondary-fixed/20'}`}></div>
                            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1200')] opacity-10 bg-cover bg-center mix-blend-overlay"></div>
                            
                            {/* Login Text Content (Fades in/out) */}
                            <div className={`absolute inset-0 p-12 flex flex-col justify-between transition-all duration-700 ease-out ${isLogin ? 'opacity-100 delay-300' : 'opacity-0 -translate-x-20 pointer-events-none'}`}>
                                <div className="flex items-center gap-3">
                                    <span className="material-symbols-outlined text-secondary text-5xl drop-shadow-[0_0_15px_rgba(0,241,253,0.5)]" style={{ fontVariationSettings: "'FILL' 1" }}>vital_signs</span>
                                    <span className="font-h2 text-h2 font-bold text-white tracking-tight">Aethra</span>
                                </div>
                                <div className="max-w-lg mb-20">
                                    <div className="glass-panel p-10 rounded-3xl border-l-4 border-l-secondary shadow-2xl hover:shadow-[0_0_30px_rgba(0,241,253,0.2)] transition-shadow duration-500">
                                        <h2 className="font-h2 text-[32px] text-white mb-4 leading-tight">Precision Intelligence for Biomedical Diagnostics.</h2>
                                        <p className="font-body-lg text-on-surface-variant leading-relaxed opacity-90">
                                            Aethra represents the convergence of proprietary biometric hardware and advanced cloud analytics. Log in to access the zero-latency monitoring ecosystems.
                                        </p>
                                    </div>
                                </div>
                                <div className="text-on-surface-variant/50 text-sm font-label-caps tracking-widest uppercase">
                                    © 2026 Powered by rahul ghulam.
                                </div>
                            </div>

                            {/* Sign Up Text Content (Fades in/out) */}
                            <div className={`absolute inset-0 p-12 flex flex-col justify-between text-right transition-all duration-700 ease-out ${!isLogin ? 'opacity-100 delay-300' : 'opacity-0 translate-x-20 pointer-events-none'}`}>
                                <div className="flex items-center justify-end gap-3 w-full">
                                    <span className="font-h2 text-h2 font-bold text-white tracking-tight">Aethra</span>
                                    <span className="material-symbols-outlined text-tertiary-fixed text-5xl drop-shadow-[0_0_15px_rgba(155,203,255,0.5)]" style={{ fontVariationSettings: "'FILL' 1" }}>biotech</span>
                                </div>
                                <div className="max-w-lg mb-20 self-end">
                                    <div className="glass-panel p-10 rounded-3xl border-r-4 border-r-tertiary-fixed shadow-2xl hover:shadow-[0_0_30px_rgba(155,203,255,0.2)] transition-shadow duration-500">
                                        <h2 className="font-h2 text-[32px] text-white mb-4 leading-tight">Join the Network.</h2>
                                        <p className="font-body-lg text-on-surface-variant leading-relaxed opacity-90">
                                            Register your operative ID to gain access to our secure, real-time biomedical diagnostics and sensor-to-cloud analytics suite.
                                        </p>
                                    </div>
                                </div>
                                <div className="text-on-surface-variant/50 text-sm font-label-caps tracking-widest uppercase">
                                    System Clearance Required.
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* --- FORM PANEL (SLIDING OPPOSITE TO BRANDING) --- */}
                    <div className={`absolute top-0 w-full lg:w-1/2 h-full flex items-center justify-center p-6 sm:p-12 z-10 transition-transform duration-[1000ms] ease-in-out ${isLogin ? 'translate-x-0 lg:translate-x-full' : 'translate-x-0'}`}>
                        <div className="w-full max-w-md relative min-h-[650px] sm:min-h-[700px] flex items-center justify-center">
                            
                            {/* LOGIN FORM CONTAINER */}
                            <div className={`w-full absolute transition-all duration-700 ease-out ${isLogin ? 'opacity-100 z-20 delay-300 translate-y-0 lg:translate-x-0' : 'opacity-0 z-0 pointer-events-none translate-y-10 lg:translate-y-0 lg:-translate-x-20'}`}>
                                <div className="glass-card rounded-3xl p-8 sm:p-10 w-full">
                                    {/* Mobile Logo */}
                                    <div className="flex lg:hidden items-center justify-center gap-3 mb-10">
                                        <span className="material-symbols-outlined text-secondary text-4xl" style={{ fontVariationSettings: "'FILL' 1" }}>vital_signs</span>
                                        <span className="font-h2 text-3xl font-bold text-white tracking-tight">Aethra</span>
                                    </div>
                                    
                                    <div className="mb-10 text-center lg:text-left">
                                        <h1 className="font-h2 text-[32px] sm:text-h1 text-white mb-2 tracking-tight">Welcome Back</h1>
                                        <p className="font-body-md text-sm sm:text-body-lg text-secondary-fixed/80">Secure System Access</p>
                                    </div>
                                    
                                    {loginError && (
                                        <div className="mb-8 p-4 bg-error-container/40 border border-error/50 rounded-xl text-center animate-pulse">
                                            <p className="text-error text-sm font-medium">{loginError}</p>
                                        </div>
                                    )}

                                    <form className="space-y-6" onSubmit={handleLoginSubmit}>
                                        <div className="space-y-2">
                                            <label className="block font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest pl-1">username</label>
                                            <div className="relative group">
                                                <span className="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary transition-colors">person</span>
                                                <input className="glass-input w-full rounded-2xl pl-12 pr-4 py-4 text-white placeholder-on-surface-variant/40 font-body-md transition-all" placeholder="Masukkan email..." type="email" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-center px-1">
                                                <label className="block font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest">Password</label>
                                                <a className="font-label-caps text-[10px] text-secondary-fixed hover:text-white transition-colors cursor-pointer uppercase tracking-widest">Recover?</a>
                                            </div>
                                            <div className="relative group">
                                                <span className="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary transition-colors">lock</span>
                                                <input className="glass-input w-full rounded-2xl pl-12 pr-4 py-4 text-white placeholder-on-surface-variant/40 font-body-md transition-all" placeholder="••••••••" type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} />
                                            </div>
                                        </div>
                                        <button disabled={isLoginLoading} className="btn-primary w-full rounded-2xl py-4 font-h3 text-[18px] text-surface-container-lowest font-bold mt-10 flex justify-center items-center gap-3 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(0,241,253,0.3)]" type="submit">
                                            {isLoginLoading ? 'Verifikasi...' : 'Login To Sistem'}
                                            <span className="material-symbols-outlined fill-icon">arrow_forward</span>
                                        </button>
                                    </form>
                                    <div className="mt-10 text-center lg:text-left pt-6 border-t border-white/10">
                                        <p className="font-body-md text-sm text-on-surface-variant">
                                            Belum memiliki akun? <a onClick={toggleMode} className="text-secondary hover:text-white font-bold transition-colors ml-2 cursor-pointer underline underline-offset-4 decoration-secondary/30">Daftar sekarang</a>
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* SIGN UP FORM CONTAINER */}
                            <div className={`w-full absolute transition-all duration-700 ease-out ${!isLogin ? 'opacity-100 z-20 delay-300 translate-y-0 lg:translate-x-0' : 'opacity-0 z-0 pointer-events-none -translate-y-10 lg:-translate-y-0 lg:translate-x-20'}`}>
                                <div className="glass-card rounded-3xl p-8 sm:p-10 w-full">
                                    {/* Mobile Logo */}
                                    <div className="flex lg:hidden items-center justify-center gap-3 mb-10">
                                        <span className="material-symbols-outlined text-tertiary-fixed text-4xl" style={{ fontVariationSettings: "'FILL' 1" }}>biotech</span>
                                        <span className="font-h2 text-3xl font-bold text-white tracking-tight">Aethra</span>
                                    </div>
                                    
                                    <div className="mb-10 text-center lg:text-left">
                                        <h1 className="font-h2 text-[32px] sm:text-h1 text-white mb-2 tracking-tight">Create Account</h1>
                                        <p className="font-body-md text-sm sm:text-body-lg text-tertiary-fixed/80">Clinical Data Registration</p>
                                    </div>
                                    
                                    {signUpError && (
                                        <div className="mb-8 p-4 bg-error-container/40 border border-error/50 rounded-xl text-center">
                                            <p className="text-error text-sm font-medium">{signUpError}</p>
                                        </div>
                                    )}
                                    
                                    <form className="flex flex-col gap-6" onSubmit={handleSignUpSubmit}>
                                        <div className="flex flex-col gap-2">
                                            <label className="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest pl-1">Nama Lengkap</label>
                                            <div className="relative group">
                                                <span className="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant group-focus-within:text-tertiary-fixed transition-colors">person_add</span>
                                                <input className="glass-input w-full rounded-2xl pl-12 pr-4 py-4 text-white placeholder-on-surface-variant/40 font-body-md transition-all" placeholder="Masukkan nama Anda" type="text" value={signUpFullName} onChange={(e) => setSignUpFullName(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <label className="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest pl-1">Email Operatif</label>
                                            <div className="relative group">
                                                <span className="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant group-focus-within:text-tertiary-fixed transition-colors">badge</span>
                                                <input className="glass-input w-full rounded-2xl pl-12 pr-4 py-4 text-white placeholder-on-surface-variant/40 font-body-md transition-all" placeholder="Masukkan email" type="email" value={signUpEmail} onChange={(e) => setSignUpEmail(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <label className="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest pl-1">Kata Sandi</label>
                                            <div className="relative group">
                                                <span className="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant group-focus-within:text-tertiary-fixed transition-colors">lock</span>
                                                <input className="glass-input w-full rounded-2xl pl-12 pr-4 py-4 text-white placeholder-on-surface-variant/40 font-body-md transition-all" placeholder="••••••••" type="password" value={signUpPassword} onChange={(e) => setSignUpPassword(e.target.value)} />

                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-8 gap-2">
                                        <div>
                                            <h2 className="font-h2 text-[24px] sm:text-h2 font-bold text-on-surface tracking-tight mb-2">Manajemen Data Pengguna</h2>
                                            <p className="font-body-md text-sm sm:text-body-md text-on-surface-variant">Melihat daftar kredensial operatif Aethra secara langsung dari Firestore.</p>
                                        </div>
                                    </div>
                                    <div className="glass-card rounded-xl overflow-hidden w-full">
                                        <div className="overflow-x-auto">
                                            <table className="w-full min-w-[700px] text-left border-collapse">
                                                <thead className="bg-surface-container/30 backdrop-blur-md">
                                                    <tr className="border-b border-white/20 font-label-caps text-label-caps text-on-surface-variant uppercase">
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Data Diri (Nama)</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Email Operatif</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Kata Sandi</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Status Akun</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="font-body-md text-sm sm:text-body-md text-on-surface divide-y divide-white/10">
                                                    {usersList.map((u, i) => (
                                                        <tr key={i} className="hover:bg-white/10 transition-colors">
                                                            <td className="py-4 px-4 sm:px-6 font-medium text-primary-fixed whitespace-nowrap">{u.fullName}</td>
                                                            <td className="py-4 px-4 sm:px-6 text-on-surface-variant">{u.email}</td>
                                                            <td className="py-4 px-4 sm:px-6 font-mono text-[12px] sm:text-sm tracking-wider opacity-80">{u.password}</td>
                                                            <td className="py-4 px-4 sm:px-6">
                                                                <span className={`px-2 sm:px-3 py-1 rounded-full text-[10px] sm:text-xs font-label-caps uppercase border border-white/10 ${u.email === 'admin@aethra.com' ? 'bg-secondary/20 text-secondary' : 'bg-tertiary-fixed/20 text-tertiary-fixed'}`}>
                                                                    {u.email === 'admin@aethra.com' ? 'Admin' : 'Terverifikasi'}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {usersList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="4" className="py-12 text-center text-on-surface-variant">Belum ada data atau sedang menarik dari Cloud...</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}

                            {/* ADMIN VIEW: TAB LAPORAN KESEHATAN */}
                            {isAdmin && activeTab === 'admin_reports' && (
                                <React.Fragment>
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-8 gap-4">
                                        <div>
                                            <h2 className="font-h2 text-[24px] sm:text-h2 font-bold text-on-surface tracking-tight mb-2">Laporan Kesehatan (Vitals)</h2>
                                            <p className="font-body-md text-sm sm:text-body-md text-on-surface-variant">Pemantauan metrik biomedis untuk semua pengguna terdaftar.</p>
                                        </div>
                                    </div>
                                    <div className="glass-card rounded-xl overflow-hidden w-full">
                                        <div className="overflow-x-auto">
                                            <table className="w-full min-w-[800px] text-left border-collapse">
                                                <thead className="bg-surface-container/30 backdrop-blur-md">
                                                    <tr className="border-b border-white/20 font-label-caps text-[10px] sm:text-label-caps text-on-surface-variant uppercase">
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Pengguna</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Heart Rate</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">SpO2 (Oksigen)</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Tekanan Darah</th>
                                                        <th className="py-4 sm:py-5 px-4 sm:px-6 font-medium">Status Kesehatan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="font-body-md text-sm sm:text-body-md text-on-surface divide-y divide-white/10">
                                                    {usersList.map((u, i) => {
                                                        const health = getMockHealthData(u.email);
                                                        return (
                                                            <tr key={i} className="hover:bg-white/10 transition-colors group">
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="font-medium text-primary-fixed whitespace-nowrap">{u.fullName}</div>
                                                                    <div className="text-[12px] sm:text-sm text-on-surface-variant">{u.email}</div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-baseline gap-1">
                                                                        <span className="font-data-display text-[20px] sm:text-[24px]">{health.hr}</span>
                                                                        <span className="text-[10px] sm:text-xs text-on-surface-variant">BPM</span>
                                                                    </div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-baseline gap-1">
                                                                        <span className="font-data-display text-[20px] sm:text-[24px]">{health.spo2}</span>
                                                                        <span className="text-[10px] sm:text-xs text-on-surface-variant">%</span>
                                                                    </div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-baseline gap-1">
                                                                        <span className="font-data-display text-[20px] sm:text-[24px]">{health.bp}</span>
                                                                        <span className="text-[10px] sm:text-xs text-on-surface-variant">mmHg</span>
                                                                    </div>
                                                                </td>
                                                                <td className="py-4 px-4 sm:px-6">
                                                                    <div className="flex items-center gap-2">
                                                                        <div className={`w-2 h-2 rounded-full ${health.dotColor} neon-glow shrink-0`}></div>
                                                                        <span className={`${health.color} font-label-caps uppercase text-[10px] whitespace-nowrap`}>{health.status}</span>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {usersList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="5" className="py-12 text-center text-on-surface-variant">Belum ada data atau sedang menarik dari Cloud...</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('auth');
            
            // --- STATE DATABASE ---
            const [users, setUsers] = useState([]); 
            const [currentUser, setCurrentUser] = useState(null); 
            const [dbReady, setDbReady] = useState(false);

            const firebaseConfig = {
                apiKey: "AIzaSyDDYYlbjYJd3aUH04xlNcVIwt-6FhuqDxg",
                authDomain: "aethra-health.firebaseapp.com",
                projectId: "aethra-health",
                storageBucket: "aethra-health.firebasestorage.app",
                messagingSenderId: "1092134542451",
                appId: "1:1092134542451:web:b6a83dedfb562b37e4de06",
                measurementId: "G-MP3R2GG8N2"
            };

            // 1. Inisialisasi Firebase Database
            useEffect(() => {
                const initFirebase = () => {
                    if (window.fbInitializeApp && window.fbGetFirestore) {
                        try {
                            const app = window.fbInitializeApp(firebaseConfig);
                            window.db = window.fbGetFirestore(app);
                            setDbReady(true);
                        } catch (e) {
                            console.error("Gagal menginisialisasi Firebase.", e);
                        }
                    }
                };

                if (window.fbInitializeApp) {
                    initFirebase();
                } else {
                    window.addEventListener('firebaseLoaded', initFirebase);
                    return () => window.removeEventListener('firebaseLoaded', initFirebase);
                }
            }, []);

            // 2. Tarik Data Akun secara Real-Time
            useEffect(() => {
                if (!dbReady || !window.db) return;
                
                try {
                    const usersRef = window.fbCollection(window.db, 'users');
                    const unsubscribe = window.fbOnSnapshot(usersRef, (snapshot) => {
                        const loadedUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setUsers(loadedUsers);
                    }, (error) => {
                        console.error("Firestore Error:", error);
                    });
                    
                    return () => unsubscribe();
                } catch(e) {}
            }, [dbReady]);

            const handleSignUp = async (fullName, email, password) => {
                const userExists = users.find(u => u.email === email);
                if (userExists) return false; 
                
                const newUser = { fullName, email, password, createdAt: new Date().toISOString() };
                
                if (dbReady && window.db) {
                    try {
                        const usersRef = window.fbCollection(window.db, 'users');
                        await window.fbAddDoc(usersRef, newUser);
                        setCurrentUser(newUser); 
                        return true;
                    } catch(e) {
                        return false;
                    }
                } else {
                    return false;
                }
            };

            const handleLogin = async (email, password) => {
                if (!dbReady || !window.db) {
                    return false;
                }

                try {
                    const usersRef = window.fbCollection(window.db, 'users');
                    const q = window.fbQuery(usersRef, window.fbWhere("email", "==", email), window.fbWhere("password", "==", password));
                    
                    const querySnapshot = await window.fbGetDocs(q);
                    if (!querySnapshot.empty) {
                        const foundUser = querySnapshot.docs[0].data();
                        setCurrentUser(foundUser);
                        return true;
                    }
                    return false;
                } catch (e) {
                    return false;
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentPage('auth');
            };

            const renderPage = () => {
                switch(currentPage) {
                    case 'auth': 
                        return <AuthContainer navigate={setCurrentPage} onLogin={handleLogin} onSignUp={handleSignUp} />;
                    case 'home': 
                        return <HomePage navigate={setCurrentPage} currentUser={currentUser} />;
                    case 'about': 
                        return <AboutPage navigate={setCurrentPage} currentUser={currentUser} />;
                    case 'dashboard': 
                        return <DashboardPage navigate={setCurrentPage} currentUser={currentUser} onLogout={handleLogout} usersList={users} />;
                    default: 
                        return <AuthContainer navigate={setCurrentPage} onLogin={handleLogin} onSignUp={handleSignUp} />;
                }
            };

            return (
                <div className="w-full min-h-screen">
                    {renderPage()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
